<!DOCTYPE html>
<html>
<head>
    <title>Register - CX Analytics</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* 🌌 Background */
        .bg-glow {
            background: radial-gradient(circle at top, #0f172a, #020617);
        }

        /* 🧊 Glass card */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(99,102,241,0.2);
            animation: fadeIn 0.6s ease;
        }

        /* ✨ Input */
        .input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 12px #6366f1;
        }

        .btn-glow:hover {
            box-shadow: 0 0 15px #6366f1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="bg-glow min-h-screen flex items-center justify-center text-white">

<div class="card p-10 w-96">

    <!-- 🔥 Heading -->
    <h2 class="text-3xl font-bold mb-2 text-center bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">
        Create Account 🚀
    </h2>

    <p class="text-center text-gray-400 mb-6 text-sm">
        Start your CX analytics journey
    </p>

    <!-- FLASH -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="
                p-3 mb-4 text-center rounded-lg
                {% if category == 'error' %}bg-red-500/20 text-red-400{% endif %}
                {% if category == 'success' %}bg-green-500/20 text-green-400{% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    <!-- FORM -->
    <form method="POST" autocomplete="off">

        <!-- Username -->
        <div class="mb-4">
            <label class="text-sm text-gray-400">Username</label>
            <input type="text" name="username" required
                   value="{{ request.form.username }}"
                   placeholder="Choose a username"
                   class="input w-full p-3 mt-1 rounded-lg focus:outline-none">
        </div>

        <!-- Password -->
        <div class="mb-2 relative">
            <label class="text-sm text-gray-400">Password</label>
            <input type="password" name="password" id="password" required
                   placeholder="Create a password"
                   class="input w-full p-3 mt-1 rounded-lg focus:outline-none pr-10">

            <!-- 👁 Toggle -->
            <span onclick="togglePassword()"
                  class="absolute right-3 top-10 cursor-pointer text-gray-400 hover:text-white">
                👁
            </span>
        </div>

        <!-- Password rules -->
        <p class="text-xs text-gray-500 mb-4">
            Must be 8+ chars, include A-Z, a-z, number & symbol (!@#)
        </p>

        <!-- Button -->
        <button class="w-full p-3 rounded-lg bg-gradient-to-r from-indigo-500 to-purple-600 hover:scale-105 transition btn-glow">
            Create Account
        </button>

    </form>

    <!-- Footer -->
    <p class="text-center mt-5 text-sm text-gray-400">
        Already have an account?
        <a href="/login" class="text-indigo-400 hover:underline">Login</a>
    </p>

</div>

<!-- JS -->
<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
