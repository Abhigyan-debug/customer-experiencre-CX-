<!DOCTYPE html>
<html class="transition-colors duration-300">
<head>
    <title>CX Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 🔥 DARK MODE ENABLE -->
    <script>
    tailwind.config = {
      darkMode: 'class'
    }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        button, a {
          transition: all 0.3s ease;
        }

        button:hover {
          transform: scale(1.05);
          box-shadow: 0 0 20px rgba(59,130,246,0.6);
        }

        .glass {
         background: rgba(255, 255, 255, 0.07);
         backdrop-filter: blur(20px);
         border-radius: 20px;
         border: 1px solid rgba(255,255,255,0.15);
         box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .sidebar {
         width: 250px;
         background: rgba(10,10,20,0.6);
         backdrop-filter: blur(20px);
         border-right: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
          background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(147,51,234,0.3));
          transform: translateX(8px) scale(1.03);
        }

        .active {
         background: linear-gradient(135deg, #3b82f6, #9333ea);
        }

        .page {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .orb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #3b82f6, #9333ea);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.4); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-blue-900 text-white dark:bg-gray-900 transition-colors duration-300">

<!-- BG -->
<div class="fixed inset-0 -z-10 bg-gradient-to-br from-black via-indigo-900 to-black dark:from-gray-900 dark:via-black"></div>

<!-- Loader -->
<div id="loader">
    <div class="orb"></div>
</div>

<div class="flex">

    <!-- SIDEBAR -->
    <div class="sidebar glass p-6 flex flex-col justify-between h-screen sticky top-0 dark:bg-gray-900">

        <div>
            <h1 class="text-2xl font-bold text-blue-400 mb-8 flex items-center gap-2">
                🚀 CX Analytics
            </h1>

            <nav class="space-y-3 text-lg">

                <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' %}active{% endif %}">
                    <i data-lucide="layout-dashboard"></i>
                    Dashboard
                </a>

                <a href="/analytics" class="nav-item {% if request.path == '/analytics' %}active{% endif %}">
                    <i data-lucide="bar-chart-3"></i>
                    Analytics
                </a>

                <a href="/customers" class="nav-item {% if request.path == '/customers' %}active{% endif %}">
                    <i data-lucide="users"></i>
                    Customers
                </a>

                <a href="/reports" class="nav-item {% if request.path == '/reports' %}active{% endif %}">
                    <i data-lucide="file-text"></i>
                    Reports
                </a>

                {% if current_user.is_authenticated and current_user.role == 'admin' %}
                <a href="/admin" class="nav-item {% if request.path == '/admin' %}active{% endif %}">
                    <i data-lucide="shield"></i>
                    Admin Panel
                </a>
                {% endif %}

                <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
                    <i data-lucide="settings"></i>
                    Settings
                </a>

                <a href="/about" class="nav-item {% if request.path == '/about' %}active{% endif %}">
                    <i data-lucide="info"></i>
                    About
                </a>

            </nav>
        </div>

        <a href="/logout" class="text-red-400 flex items-center gap-2">
            <i data-lucide="log-out"></i>
            Logout
        </a>

    </div>

    <!-- MAIN -->
    <div class="flex-1 p-10 overflow-y-auto h-screen page">
        {% block content %}
        {% endblock %}
    </div>

</div>

<!-- JS -->
<script>
lucide.createIcons();

// 🌙 DARK MODE GLOBAL (IMPORTANT)
function toggleDark(){
    document.documentElement.classList.toggle("dark")

    localStorage.setItem(
        "darkMode",
        document.documentElement.classList.contains("dark")
    )
}

// load saved theme
if(localStorage.getItem("darkMode") === "true"){
    document.documentElement.classList.add("dark")
}

// loader
window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    loader.style.opacity = "0";
    setTimeout(() => loader.style.display = "none", 600);
});
</script>

</body>
</html>
