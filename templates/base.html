<!DOCTYPE html>
<html class="transition-colors duration-300">
<head>
    <title>CX Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
    tailwind.config = {
      darkMode: 'class'
    }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        button, a {
          transition: all 0.3s ease;
        }

        button:hover {
          transform: scale(1.05);
          box-shadow: 0 0 20px rgba(59,130,246,0.6);
        }

        .glass {
         background: rgba(255, 255, 255, 0.07);
         backdrop-filter: blur(25px);
         border-radius: 20px;
         border: 1px solid rgba(255,255,255,0.15);
         box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* 🔥 AI BACKGROUND GLOW */
        .ai-glow{
            position:absolute;
            inset:0;
            background:radial-gradient(circle at top,#3b82f650,transparent 70%);
            opacity:0.12;
            pointer-events:none;
            z-index:0; /* 🔥 ADD */
        }

        /* 🔥 SIDEBAR */
        .sidebar {
         width: 250px;
         background: rgba(10,10,20,0.6);
         backdrop-filter: blur(25px);
         border-right: 1px solid rgba(255,255,255,0.1);
         box-shadow: 0 0 40px rgba(59,130,246,0.15);
         position: relative;
         animation: slideIn 0.6s ease;
         z-index:10; /* 🔥 ADD */
        }

        .sidebar::before{
            content:"";
            position:absolute;
            inset:0;
            border-radius:20px;
            background:linear-gradient(180deg,#3b82f6,#9333ea,transparent);
            opacity:0.08;
        }

        /* 🔥 NAV */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item:hover {
          background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(147,51,234,0.25));
          transform: translateX(10px) scale(1.05);
          box-shadow: 0 0 20px rgba(59,130,246,0.4);
        }

        .nav-item:hover i{
            transform: scale(1.3) rotate(8deg);
        }

        .active {
         background: linear-gradient(135deg, #3b82f6, #9333ea);
         box-shadow: 0 0 25px rgba(59,130,246,0.6);
        }

        .active::before{
            content:"";
            position:absolute;
            left:0;
            top:10%;
            height:80%;
            width:4px;
            background:#60a5fa;
            border-radius:10px;
        }

        .nav-item i{
            transition: all 0.3s ease;
        }

        /* 🔥 PAGE */
        .page {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-40px); opacity:0; }
            to { transform: translateX(0); opacity:1; }
        }

        /* 🔥 FLOATING LOGO ANIMATION */
        @keyframes floatSoft {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }

        .logo-float {
            animation: floatSoft 4s ease-in-out infinite;
        }

        /* LOADER */
        #loader {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            pointer-events: none; /* 🔥 ADD */
        }

        .orb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #3b82f6, #9333ea);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.4); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-blue-900 text-white dark:bg-gray-900 transition-colors duration-300">

<div class="fixed inset-0 -z-10 bg-gradient-to-br from-black via-indigo-900 to-black dark:from-gray-900 dark:via-black"></div>

<!-- Loader -->
<div id="loader">
    <div class="orb"></div>
</div>

<div class="flex">

    <!-- SIDEBAR -->
    <div class="sidebar glass p-6 flex flex-col justify-between h-screen sticky top-0 dark:bg-gray-900">

        <div class="ai-glow"></div>

        <div>
            <h1 class="text-2xl font-semibold mb-8 flex items-center gap-3 group logo-float">
                <span>🚀</span>
                <span class="bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                    CX Analytics
                </span>
                <span class="text-[10px] bg-blue-500/20 px-2 py-1 rounded-md text-blue-300 animate-pulse">
                    AI
                </span>
            </h1>

            <nav class="space-y-3 text-lg">
              <a href="/dashboard" class="nav-item">Dashboard</a>
              <a href="/analytics" class="nav-item">Analytics</a>
              <a href="/customers" class="nav-item">Customers</a>
              <a href="/reports" class="nav-item">Reports</a>

             {% if current_user.is_authenticated and current_user.role == 'admin' %}
             <a href="/admin" class="nav-item"> Admin Panel</a>
             {% endif %}

             <a href="/settings" class="nav-item">Settings</a>
             <a href="/about" class="nav-item">About</a>
          </nav>
        </div>

        <!-- LOGOUT FIX -->
        <a href="{{ url_for('logout') }}" 
           class="relative z-50 text-red-400 flex items-center gap-2 hover:text-red-500 hover:translate-x-2 transition">
            <i data-lucide="log-out"></i>
            Logout
        </a>

    </div>

    <div class="flex-1 p-10 overflow-y-auto h-screen page">
        {% block content %}{% endblock %}
    </div>

</div>

<script>
lucide.createIcons();

window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    loader.style.display = "none";  // 🔥 FIX
});
</script>
<script>
function toggleDark() {
    document.documentElement.classList.toggle("dark")

    if (document.documentElement.classList.contains("dark")) {
        localStorage.setItem("theme", "dark")
    } else {
        localStorage.setItem("theme", "light")
    }
}

window.onload = () => {
    if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark")
    }
}
</script>

</body>
</html>
