<!DOCTYPE html>
<html class="transition-colors duration-300">
<head>
    <!-- Apply the saved theme before first paint, to avoid a flash of the
         wrong theme. Deliberately synchronous and inline, ahead of the
         stylesheet, since it just sets an attribute the CSS reads. -->
    <script>
    (function () {
        try {
            var t = localStorage.getItem('pulsecx-theme');
            document.documentElement.dataset.theme = (t === 'light') ? 'light' : 'dark';
        } catch (e) {
            document.documentElement.dataset.theme = 'dark';
        }
    })();
    </script>

    <title>CX Analytics</title>

    <!-- Fonts - preconnect so the (unavoidable, still-external) font request
         doesn't pay DNS+TLS setup time on top of the actual font fetch. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Custom design system (replaces the in-browser Tailwind JIT compiler
         that used to run here - see static/style.css for the full utility layer) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Vendor JS is self-hosted (static/vendor/) instead of loaded from 3
         separate CDN origins (jsdelivr/unpkg/cdnjs) - that meant every page
         navigation paid a fresh DNS+TLS handshake per origin, and worse,
         none of these were `defer`red, so the browser couldn't paint
         anything until all three had fully downloaded and executed. Now
         self-hosted + deferred: parsing/painting the page no longer waits
         on them, and every inline script that needs Chart/lucide/THREE is
         wrapped in a DOMContentLoaded listener below (deferred scripts run
         before that event fires, so ordering is guaranteed regardless of
         where in the DOM each piece sits). -->
    <script src="{{ url_for('static', filename='vendor/chart.umd.min.js') }}" defer></script>
    <script src="{{ url_for('static', filename='vendor/lucide.min.js') }}" defer></script>
    <script src="{{ url_for('static', filename='vendor/three.min.js') }}" defer></script>

    <!-- Custom dropdown (replaces native <select> popups) -->
    <script src="{{ url_for('static', filename='js/custom-select.js') }}" defer></script>

    <!-- KPI card count-up animation, shared by every page with live stats -->
    <script src="{{ url_for('static', filename='js/kpi-count.js') }}" defer></script>

    <!-- Theme toggle -->
    <script src="{{ url_for('static', filename='js/theme.js') }}" defer></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Page-structural rules that only apply within this shell layout.
           The design-system classes (.glass, .tilt-card, .sidebar, .nav-item,
           .active, etc.) now live in static/style.css as theme-aware rules -
           see the "App shell" section there - so every page shares one
           definition instead of base.html silently overriding it with a
           hardcoded dark-only copy. */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -10;
        }

        /* Page */
        .page {
            animation: fadeIn 0.6s ease-in-out;
            position: relative;
            z-index: 5;
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            pointer-events: none;
            transition: background-color 0.3s ease;
        }

        .orb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #0099FF, #00D084);
            animation: orbPulse 1.5s infinite ease-in-out;
            box-shadow: 0 0 30px #0099FF;
        }

        @keyframes orbPulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>

<body>

<div id="canvas-container"></div>

<!-- Loader -->
<div id="loader">
    <div class="orb"></div>
</div>

<div class="flex">

    <!-- SIDEBAR -->
    <div class="sidebar flex flex-col justify-between h-screen sticky top-0 p-6">

        <div class="ai-glow"></div>

        <div class="relative z-10">
            <h1 class="text-2xl font-bold mb-10 flex items-center gap-3">
                <i data-lucide="hexagon" class="text-primary w-8 h-8"></i>
                <span class="text-white tracking-wide drop-shadow-lg">
                    PulseCX
                </span>
                <span class="text-2xs bg-primary/20 px-2 py-1 rounded-md text-primary font-bold tracking-wider animate-pulse border border-primary/30">
                    AI
                </span>
            </h1>

            <nav class="space-y-3">
              <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' %}active{% endif %}">
                  <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
              </a>
              <a href="/analytics" class="nav-item {% if request.path == '/analytics' %}active{% endif %}">
                  <i data-lucide="pie-chart" class="w-5 h-5"></i> Analytics
              </a>
              <a href="/customers" class="nav-item {% if request.path == '/customers' %}active{% endif %}">
                  <i data-lucide="users" class="w-5 h-5"></i> Customers
              </a>
              <a href="/reports" class="nav-item {% if request.path == '/reports' %}active{% endif %}">
                  <i data-lucide="file-text" class="w-5 h-5"></i> Reports
              </a>

             {% if current_user.is_authenticated and current_user.role == 'admin' %}
             <a href="/admin" class="nav-item {% if request.path == '/admin' %}active{% endif %}">
                 <i data-lucide="shield" class="w-5 h-5"></i> Admin
             </a>
             {% endif %}

             <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
                 <i data-lucide="settings" class="w-5 h-5"></i> Settings
             </a>
          </nav>
        </div>

        <div class="relative z-50" style="display: flex; flex-direction: column; gap: 8px;">
            <button type="button" data-theme-toggle
               class="nav-item"
               style="width: 100%; text-align: left; cursor: pointer;"
               aria-label="Switch to light mode">
                <i data-lucide="moon" class="w-5 h-5"></i>
                <span>Theme</span>
            </button>

            <a href="{{ url_for('logout') }}"
               class="text-red-400 font-semibold flex items-center gap-3 p-3 rounded-xl hover:bg-red-500/10 hover:text-red-500 transition-all border border-transparent hover:border-red-500/30">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                Logout
            </a>
        </div>

    </div>

    <div class="flex-1 p-10 overflow-y-auto h-screen page">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- Three.js Background Script -->
<script>
// chart.js/lucide/three.js now load with `defer`, so this needs to wait
// for DOMContentLoaded (deferred scripts finish before that event fires)
// instead of running immediately at parse time, or THREE would still be
// undefined at this point.
document.addEventListener('DOMContentLoaded', function () {
(function () {
    const container = document.getElementById('canvas-container');
    const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Reads the current theme's --bg-main straight from computed CSS instead
    // of hardcoding a color, so the background follows the light/dark toggle
    // without having to rebuild the whole scene.
    function bgColorHex() {
        const v = getComputedStyle(document.documentElement).getPropertyValue('--bg-main').trim();
        return v || '#0B1220';
    }

    // The WebGL background was the single biggest ongoing CPU/GPU cost on
    // every authenticated page - a continuous render loop running behind
    // frosted-glass (backdrop-filter: blur) sidebar/cards, which forces the
    // browser to recomposite that blur against a moving canvas every frame.
    // That combination is what made the app feel laggy specifically after
    // signing in (public pages don't have this shell). Using the static
    // gradient fallback unconditionally here instead of only on
    // prefers-reduced-motion - zero CPU/GPU cost, same visual mood.
    const forceStaticBackground = true;
    if (reduceMotion || forceStaticBackground) {
        function paintFallback() {
            container.style.background = 'radial-gradient(circle at top right, rgba(0,153,255,0.12), transparent 60%), ' + bgColorHex();
        }
        paintFallback();
        document.addEventListener('theme-changed', paintFallback);
        return;
    }

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(new THREE.Color(bgColorHex()).getHex(), 0.0015);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.z = 800;

    // antialias:false - this is a soft, blurred-by-fog background of small
    // points and thin lines, not sharp geometry, so MSAA cost here buys
    // nothing visible. powerPreference nudges multi-GPU laptops toward the
    // integrated GPU for what's purely a decorative background.
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false, powerPreference: 'low-power' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    // Capping pixel ratio avoids rendering 3-4x the visible pixels on retina/4K
    // displays, which was the single biggest GPU cost of this background.
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
    container.appendChild(renderer.domElement);

    // Particles - trimmed from 1500 to keep this a background flourish, not a load
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 500;
    const posArray = new Float32Array(particlesCount * 3);

    for (let i = 0; i < particlesCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 2000;
    }

    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

    const particleMaterial = new THREE.PointsMaterial({
        size: 4,
        color: 0x0099FF,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending
    });

    const particlesMesh = new THREE.Points(particlesGeometry, particleMaterial);
    scene.add(particlesMesh);

    // 20 divisions instead of 40 - a quarter of the line segments for a
    // grid that sits at 0.1 opacity behind fog anyway, so the extra density
    // was never visible.
    const gridHelper = new THREE.GridHelper(2000, 20, 0x0099FF, 0x0099FF);
    gridHelper.position.y = -300;
    gridHelper.material.opacity = 0.1;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    let mouseX = 0;
    let mouseY = 0;

    document.addEventListener('mousemove', (event) => {
        mouseX = (event.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
    });

    const clock = new THREE.Clock();
    let rafId = null;

    // Cap at 60fps - on 120/144Hz displays requestAnimationFrame would
    // otherwise fire (and fully re-render) twice as often as this motion
    // needs, for no visible benefit.
    const FRAME_INTERVAL = 1000 / 60;
    let lastFrameTime = 0;

    function animate(now) {
        rafId = requestAnimationFrame(animate);

        if (now - lastFrameTime < FRAME_INTERVAL) return;
        lastFrameTime = now;

        const elapsedTime = clock.getElapsedTime();

        particlesMesh.rotation.y = elapsedTime * 0.05;
        particlesMesh.rotation.x = elapsedTime * 0.02;

        camera.position.x += (mouseX * 200 - camera.position.x) * 0.05;
        camera.position.y += (mouseY * 200 - camera.position.y) * 0.05;
        camera.lookAt(scene.position);

        renderer.render(scene, camera);
    }

    animate(performance.now());

    // Pause the render loop entirely while the tab isn't visible - a
    // dashboard left open in a background tab was burning CPU/GPU for
    // pixels nobody was looking at.
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
        } else if (rafId === null) {
            animate(performance.now());
        }
    });

    let resizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, 150);
    });

    // Follow the light/dark toggle without tearing down and rebuilding the
    // whole WebGL scene - just recolor the fog to match the new --bg-main.
    document.addEventListener('theme-changed', () => {
        scene.fog.color.set(bgColorHex());
    });
})();
});
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    lucide.createIcons();
});

window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    loader.style.opacity = '0';
    setTimeout(() => { loader.style.display = "none"; }, 500);
});
</script>

</body>
</html>
