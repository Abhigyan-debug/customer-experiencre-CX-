{% extends "base.html" %}
{% block content %}

<div class="dashboard-header mb-6">
    <h1 class="page-title">Edit Customer Feedback</h1>
    <p class="page-subtitle">Update record information</p>
</div>

<div class="tilt-card glass p-6" style="max-width: 600px;">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" name="name" value="{{ feedback.name }}" class="input-field" pattern="[A-Za-z ]+" title="Letters only">
        </div>

        <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" value="{{ feedback.phone }}" class="input-field" inputmode="numeric" pattern="\d{10}" maxlength="10" title="10 digit phone number">
        </div>

        <div class="form-group">
            <label class="form-label">Service</label>
            <input type="text" name="service" value="{{ feedback.service }}" class="input-field">
        </div>

        <div class="form-group">
            <label class="form-label">Customer Feedback</label>
            <textarea name="text" class="input-field" rows="6">{{ feedback.text }}</textarea>
        </div>

        <div style="display: flex; gap: 16px; margin-top: 32px;">
            <button type="submit" class="btn-primary" style="flex: 1; justify-content: center;">
                <i data-lucide="save"></i> Update Record
            </button>
            <a href="/customers" class="btn-primary" style="background-color: var(--bg-hover); color: var(--text-primary); flex: 1; justify-content: center;">
                Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
