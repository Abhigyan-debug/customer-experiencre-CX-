{% extends "base.html" %}
{% block content %}

<h2 class="text-3xl font-semibold mb-6 text-white flex items-center gap-2">
    Settings ⚙️
</h2>

<div class="grid grid-cols-2 gap-6 max-w-6xl">

    <!-- 🔐 ACCOUNT -->
    <div class="card">
        <h3 class="title">Account Settings</h3>

        <form method="POST" autocomplete="off" class="space-y-3">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <input type="text" name="username" placeholder="New Username" class="input">

            <input type="password" name="old_password" placeholder="Current Password" class="input" required>

            <!-- PASSWORD -->
            <div class="relative">
                <input type="password" id="newPassword" name="password" placeholder="New Password" class="input pr-10">
                <span onclick="togglePassword()" class="eye">👁</span>
            </div>

            <!-- 🔥 Strength -->
            <div id="strengthBar" class="h-1 rounded bg-gray-700"></div>

            <!-- TOGGLES -->
            <div class="flex justify-between items-center">
                <span>Email Notifications</span>
                <label class="switch">
                    <input type="checkbox" name="email_notify"
                    {% if current_user.email_notify %}checked{% endif %}>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="flex justify-between items-center">
                <span>AI Insights</span>
                <label class="switch">
                    <input type="checkbox" name="ai_toggle"
                    {% if current_user.ai_enabled %}checked{% endif %}>
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn-primary">
                Update Settings
            </button>
        </form>
    </div>

    <!-- 📊 HEALTH SCORE -->
    <div class="card text-center">
        <h3 class="title">AI Health Score</h3>

        <p class="text-4xl font-bold text-green-400 mt-4">
            {{ ai_score }}%
        </p>

        <p class="text-gray-400 text-sm mt-2">
            Overall customer satisfaction
        </p>
    </div>

    <!-- 🌙 APPEARANCE -->
    <div class="card">
        <h3 class="title">Appearance</h3>

        <button onclick="toggleDark()" class="btn-secondary">
            🌙 Toggle Dark Mode
        </button>
    </div>

    <!-- 📊 DATA -->
    <div class="card">
        <h3 class="title">Data & Reports</h3>

        <a href="/download_report"><button class="btn-green">Download AI Report</button></a>
        <a href="/export_csv"><button class="btn-blue">Export CSV</button></a>

        <form method="POST" action="/clear_data" onsubmit="return confirm('Clear all data?')">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn-yellow">Clear Data</button>
        </form>
    </div>

</div>

<!-- 🔴 DELETE -->
<div class="mt-6 max-w-6xl">
    <div class="card border-red-500/30">
        <h3 class="text-red-400 font-semibold mb-4">Danger Zone ⚠️</h3>

        <form method="POST" action="/delete_account"
        onsubmit="return confirm('Delete account permanently?')">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <button class="btn-danger">Delete Account</button>
        </form>
    </div>
</div>

<!-- 🔥 STYLES -->
<style>
.card{
    padding:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}
.card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.title{
    color:#818cf8;
    font-weight:600;
    margin-bottom:10px;
}

.input{
    width:100%;
    padding:10px;
    border-radius:8px;
    background:#1f2937;
    border:1px solid #374151;
}

.eye{
    position:absolute;
    right:10px;
    top:10px;
    cursor:pointer;
}

/* BUTTONS */
.btn-primary{background:linear-gradient(to right,#6366f1,#9333ea);padding:10px;border-radius:8px;width:100%;}
.btn-green{background:#16a34a;padding:10px;border-radius:8px;width:100%;margin-bottom:10px;}
.btn-blue{background:#2563eb;padding:10px;border-radius:8px;width:100%;margin-bottom:10px;}
.btn-yellow{background:#eab308;padding:10px;border-radius:8px;width:100%;}
.btn-danger{background:#ef4444;padding:10px;border-radius:8px;width:100%;}
.btn-secondary{background:#374151;padding:10px;border-radius:8px;width:100%;}

/* SWITCH */
.switch{
    position:relative;
    width:40px;
    height:20px;
}
.switch input{display:none;}
.slider{
    position:absolute;
    background:#555;
    border-radius:20px;
    width:100%;
    height:100%;
}
.slider:before{
    content:"";
    position:absolute;
    height:16px;
    width:16px;
    left:2px;
    bottom:2px;
    background:white;
    border-radius:50%;
    transition:.3s;
}
input:checked + .slider{
    background:#22c55e;
}
input:checked + .slider:before{
    transform:translateX(20px);
}
</style>

<!-- 🔥 JS -->
<script>
function togglePassword(){
    const p=document.getElementById("newPassword");
    p.type=p.type==="password"?"text":"password";
}

/* PASSWORD STRENGTH */
document.getElementById("newPassword").addEventListener("input",function(){
    let val=this.value;
    let strength=val.length;
    let bar=document.getElementById("strengthBar");

    if(strength<6){bar.style.background="red";}
    else if(strength<10){bar.style.background="orange";}
    else{bar.style.background="green";}
});
</script>

{% endblock %}
