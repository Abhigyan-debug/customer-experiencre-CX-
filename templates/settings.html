{% extends "base.html" %}
{% block content %}

<h2 class="text-4xl font-bold mb-6 bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">
    Settings ⚙️
</h2>

<div class="grid grid-cols-2 gap-6">

    <!-- 🔐 ACCOUNT SETTINGS -->
    <div class="glass p-6 rounded-2xl shadow-lg border border-white/10 dark:bg-gray-800 dark:border-gray-700">
        <h3 class="mb-4 text-lg text-indigo-400 font-semibold">Account Settings</h3>

        <form method="POST" autocomplete="off">

            <input type="text" name="username" placeholder="New Username"
                class="w-full mb-3 p-3 rounded-lg bg-black/40 border border-gray-700 dark:bg-gray-800 dark:text-white">

            <input type="password" name="old_password" placeholder="Current Password"
                class="w-full mb-3 p-3 rounded-lg bg-black/40 border border-gray-700 dark:bg-gray-800 dark:text-white"
                required>

            <div class="relative">
                <input type="password" name="password" id="newPassword" placeholder="New Password"
                    class="w-full mb-2 p-3 pr-10 rounded-lg bg-black/40 border border-gray-700 dark:bg-gray-800 dark:text-white">

                <span onclick="togglePassword()"
                    class="absolute right-3 top-3 cursor-pointer text-gray-400 hover:text-white">
                    👁
                </span>
            </div>

            <p class="text-xs text-gray-400 mb-3">
                Must be 8+ chars, include A-Z, a-z, number & symbol
            </p>

            <!-- EMAIL -->
            <label class="flex justify-between items-center mb-3">
                <span>Email Notifications</span>
                <input type="checkbox" name="email_notify"
                    {% if current_user.email_notify %}checked{% endif %}>
            </label>

            <!-- AI -->
            <label class="flex justify-between items-center mb-4">
                <span>Enable AI Insights</span>
                <input type="checkbox" name="ai_toggle"
                    {% if current_user.ai_enabled %}checked{% endif %}>
            </label>

            <button class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 p-3 rounded-lg hover:scale-105 transition shadow-lg">
                Update Settings
            </button>
        </form>
    </div>

    <!-- 🌙 THEME -->
    <div class="glass p-6 rounded-2xl shadow-lg border border-white/10 dark:bg-gray-800 dark:border-gray-700">
        <h3 class="mb-4 text-lg text-indigo-400 font-semibold">Appearance</h3>

        <button onclick="toggleDark()"
            class="w-full bg-gray-700 p-3 rounded-lg hover:bg-gray-600 transition">
            🌙 Toggle Dark Mode
        </button>

        <p class="text-xs text-gray-400 mt-3 text-center">
            Your preference will be saved locally
        </p>
    </div>

    <!-- 📊 DATA -->
    <div class="glass p-6 rounded-2xl shadow-lg border border-white/10 dark:bg-gray-800 dark:border-gray-700">
        <h3 class="mb-4 text-lg text-indigo-400 font-semibold">Data & Reports</h3>

        <a href="/download_report">
            <button class="w-full bg-gradient-to-r from-green-500 to-emerald-600 p-3 rounded-lg mb-3">
                📄 Download AI Report
            </button>
        </a>

        <a href="/export_csv">
            <button class="w-full bg-blue-500 p-3 rounded-lg mb-3">
                📥 Export CSV
            </button>
        </a>

        <form method="POST" action="/clear_data"
            onsubmit="return confirm('Clear all your feedback data?')">

            <button class="w-full bg-yellow-500 p-3 rounded-lg">
                🧹 Clear My Data
            </button>
        </form>
    </div>

    <!-- 🔔 NOTIFICATIONS -->
    <div class="glass p-6 rounded-2xl shadow-lg border border-white/10 dark:bg-gray-800 dark:border-gray-700">
        <h3 class="mb-4 text-lg text-indigo-400 font-semibold">Notifications</h3>

        <label class="flex items-center justify-between">
            <span>High Negative Feedback Alerts</span>
            <input type="checkbox" id="notifyToggle">
        </label>
    </div>

</div>

<!-- 🔴 DELETE -->
<div class="mt-6">
    <div class="glass p-6 rounded-2xl border border-red-500/30 dark:bg-gray-800">
        <h3 class="mb-4 text-lg text-red-400 font-semibold">Danger Zone ⚠️</h3>

        <form method="POST" action="/delete_account"
            onsubmit="return confirm('Are you sure?')">

            <button class="w-full bg-red-500 p-3 rounded-lg">
                🗑 Delete Account
            </button>
        </form>
    </div>
</div>

<!-- JS -->
<script>

function togglePassword(){
    const pwd = document.getElementById("newPassword");
    pwd.type = pwd.type === "password" ? "text" : "password";
}

/* 🔥 FIXED DARK MODE */
function toggleDark(){
    document.documentElement.classList.toggle("dark")

    localStorage.setItem(
        "darkMode",
        document.documentElement.classList.contains("dark")
    )
}

if(localStorage.getItem("darkMode") === "true"){
    document.documentElement.classList.add("dark")
}

/* NOTIFY */
document.getElementById("notifyToggle").addEventListener("change", function(){
    localStorage.setItem("notify", this.checked)
})

if(localStorage.getItem("notify") === "true"){
    document.getElementById("notifyToggle").checked = true
}

</script>

{% endblock %}
