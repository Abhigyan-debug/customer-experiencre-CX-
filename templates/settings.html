{% extends "base.html" %}
{% block content %}

<h2 class="text-3xl text-blue-400 mb-6">Settings ⚙️</h2>

<div class="grid grid-cols-2 gap-6">

    <!-- 🔐 ACCOUNT SETTINGS -->
    <div class="glass p-6">
        <h3 class="mb-4 text-lg">Account Settings</h3>

        <form method="POST">
            <input type="text" name="username" placeholder="New Username"
                class="w-full mb-3 p-2 rounded bg-gray-800 text-white">

            <input type="password" name="password" placeholder="New Password"
                class="w-full mb-3 p-2 rounded bg-gray-800 text-white">

            <button class="bg-blue-500 px-4 py-2 rounded hover:bg-blue-600">
                Update
            </button>
        </form>
    </div>

    <!-- 🌙 THEME SETTINGS -->
    <div class="glass p-6">
        <h3 class="mb-4 text-lg">Appearance</h3>

        <button onclick="toggleDark()"
            class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">
            Toggle Dark Mode 🌙
        </button>
    </div>

    <!-- 📊 DATA SETTINGS -->
    <div class="glass p-6">
        <h3 class="mb-4 text-lg">Data & Reports</h3>

        <a href="/download_report">
            <button class="bg-green-500 px-4 py-2 rounded hover:bg-green-600">
                Download AI Report 📄
            </button>
        </a>
    </div>

    <!-- 🔔 NOTIFICATIONS -->
    <div class="glass p-6">
        <h3 class="mb-4 text-lg">Notifications</h3>

        <label class="flex items-center gap-2">
            <input type="checkbox" id="notifyToggle">
            Enable Alerts (High Negative Feedback)
        </label>
    </div>

</div>

<!-- ⚡ JAVASCRIPT -->
<script>

function toggleDark(){
    document.body.classList.toggle("dark")
    localStorage.setItem("darkMode",
        document.body.classList.contains("dark"))
}

// Load saved theme
if(localStorage.getItem("darkMode") === "true"){
    document.body.classList.add("dark")
}

// Notification toggle (local only)
document.getElementById("notifyToggle").addEventListener("change", function(){
    localStorage.setItem("notify", this.checked)
})

if(localStorage.getItem("notify") === "true"){
    document.getElementById("notifyToggle").checked = true
}

</script>

{% endblock %}
