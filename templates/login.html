<!DOCTYPE html>
<html>
<head>
    <title>Login - CX Analytics</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #020617;
            overflow: hidden;
        }

        .cursor-glow {
            position: fixed;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            to { transform: translateY(-900px); opacity: 0; }
        }

        .card {
            background: linear-gradient(
                145deg,
                rgba(255,255,255,0.06),
                rgba(255,255,255,0.02)
            );
            backdrop-filter: blur(30px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow:
                0 25px 70px rgba(0,0,0,0.8),
                inset 0 1px 1px rgba(255,255,255,0.05);
            padding: 44px 36px;
            width: 420px;
            transition: transform 0.2s ease;
            transform-style: preserve-3d;
        }

        .input {
            background: rgba(0,0,0,0.65);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            transition: all 0.25s ease;
        }

        .input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 18px rgba(99,102,241,0.5);
            background: rgba(0,0,0,0.8);
            outline: none;
        }

        .btn {
            border-radius: 12px;
            font-weight: 500;
            padding: 14px;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(99,102,241,0.7);
        }
    </style>
</head>

<body class="min-h-screen flex text-white">

<div id="glow" class="cursor-glow"></div>

<script>
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.bottom="-10px";
    p.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(p);
}
</script>

<!-- LEFT -->
<div class="w-1/2 hidden lg:flex flex-col justify-center px-20 z-10">
    <h1 class="text-6xl font-bold bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">
        CX Analytics
    </h1>

    <p class="mt-6 text-gray-400 text-lg max-w-md">
        Turn your customer data into powerful insights.
    </p>

    <div class="mt-10 space-y-4 text-gray-500 text-sm">
        <p>✔ Real-time dashboards</p>
        <p>✔ AI-powered insights</p>
        <p>✔ Enterprise-grade security</p>
    </div>
</div>

<!-- RIGHT -->
<div class="w-full lg:w-1/2 flex items-center justify-center z-10">

    <div id="card" class="card">

        <h2 class="text-3xl font-semibold mb-1 bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">
            Welcome Back
        </h2>

        <p class="text-gray-400 text-sm mb-6">
            Login to continue your journey
        </p>

        <!-- ✅ FIXED FORM -->
        <form method="POST" action="/login" onsubmit="handleSubmit(event)">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- ✅ FIXED INPUTS -->
            <input type="text" name="username" required
                   placeholder="Username"
                   class="input w-full mb-4">

            <div class="relative mb-2">
                <input type="password" name="password" id="password" required
                       placeholder="Password"
                       class="input w-full pr-10">

                <button type="button"
                        onclick="togglePassword()"
                        class="absolute right-3 top-3 text-gray-400 hover:text-white">
                    <i id="eyeIcon" data-lucide="eye"></i>
                </button>
            </div>

            <p class="text-xs text-gray-500 mt-2 mb-5 text-center">
                🔐 Secure encrypted login
            </p>

            <button id="btn"
                    class="btn w-full bg-gradient-to-r from-indigo-500 to-purple-600">
                Login
            </button>

        </form>

        <p class="text-center mt-6 text-sm text-gray-400">
            Don't have an account?
            <a href="/register" class="text-indigo-400 hover:underline">Register</a>
        </p>

    </div>

</div>

<script>
lucide.createIcons();

function togglePassword() {
    const pwd = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if (pwd.type === "password") {
        pwd.type = "text";
        icon.setAttribute("data-lucide", "eye-off");
    } else {
        pwd.type = "password";
        icon.setAttribute("data-lucide", "eye");
    }
    lucide.createIcons();
}

document.addEventListener("mousemove", e=>{
    const glow=document.getElementById("glow");
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
});

/* ✅ FIXED SUBMIT */
function handleSubmit(e){
    const btn = document.getElementById("btn");
    btn.innerText = "Logging in...";
    btn.disabled = true;
    // no preventDefault → backend chalega
}

/* tilt */
const card = document.getElementById("card");
card.addEventListener("mousemove", e=>{
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateX = -(y / rect.height - 0.5) * 6;
    const rotateY = (x / rect.width - 0.5) * 6;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

card.addEventListener("mouseleave", ()=>{
    card.style.transform = "rotateX(0) rotateY(0)";
});
</script>

</body>
</html>
