<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Apply the saved theme before first paint -->
    <script>
    (function () {
        try {
            var t = localStorage.getItem('pulsecx-theme');
            document.documentElement.dataset.theme = (t === 'light') ? 'light' : 'dark';
        } catch (e) {
            document.documentElement.dataset.theme = 'dark';
        }
    })();
    </script>

    <title>Reset Password - PulseCX</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="{{ url_for('static', filename='vendor/lucide.min.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<button type="button" data-theme-toggle class="theme-toggle-fab" aria-label="Switch to light mode">
    <i data-lucide="moon"></i>
</button>

<div class="auth-container">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 8px;">
            <i data-lucide="lock" style="width: 32px; height: 32px; color: var(--primary-color);"></i>
        </div>
        <h2 class="auth-title">Set a New Password</h2>
        <p class="auth-subtitle">Choose a new password for your account.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/reset-password/{{ token }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="password" required placeholder="Create a new password" class="input-field">
                    <button type="button" onclick="togglePassword()">
                        <i id="eyeIcon" data-lucide="eye"></i>
                    </button>
                </div>
                <p class="text-secondary" style="font-size: 0.8rem; margin-top: 8px;">Must be 8+ chars with A-Z, a-z, number & symbol</p>
            </div>

            <button type="submit" class="btn-primary w-full mt-4" style="padding: 14px; font-size: 1.05rem;">
                Reset Password
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () { lucide.createIcons(); });

    function togglePassword() {
        const pwd = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");
        if (pwd.type === "password") {
            pwd.type = "text";
            icon.setAttribute("data-lucide", "eye-off");
        } else {
            pwd.type = "password";
            icon.setAttribute("data-lucide", "eye");
        }
        lucide.createIcons();
    }
</script>

</body>
</html>
